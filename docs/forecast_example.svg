  <title>Örnek tahmin grafiği: gerçek ve tahmin</title>
  <desc>Temsili bir zaman serisinde gerçek değer ile bir adım ilerisi tahminin karşılaştırılması. Tahmin dördüncü dönemden başlar, çünkü AR(3) modeli üç geçmiş gözleme ihtiyaç duyar. On beşinci dönemde ani bir sıçrama olur ve tahmin bu sıçramayı bir dönem geriden takip eder.</desc>
