<svg width="680" height="290" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kayan pencere yaklaşımı</title>
  <desc>İki zaman satırı, kayan pencerenin bir ay ileri kayarak nasıl güncellendiğini gösterir. Üst satırda (t anı) yarı saydam bir bant beş ardışık gözlemi kapsar ve kesikli halkayla işaretli bir sonraki, henüz görülmemiş dönem tahmin edilir. Alt satırda (t+1 anı) bant bir adım kayar, önceki tahmin hedefi artık bandın içindedir ve yeni bir dönem tahmin edilir.</desc>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Arka plan kasıtlı olarak şeffaf bırakıldı -->

  <!-- ==================== SATIR 1 (t anı) ==================== -->

  <text x="60" y="94" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9C9A92">t anı</text>

  <!-- Zaman ekseni (arkada) -->
  <line x1="50" y1="90" x2="600" y2="90" stroke="#444441" stroke-width="0.5" opacity="0.6"/>

  <!-- Kayan pencere: yarı saydam bant, her zeminle kaynaşır -->
  <rect x="68" y="70" width="366" height="40" rx="10" fill="#0F6E56" fill-opacity="0.25" stroke="#5DCAA5" stroke-width="0.75"/>

  <!-- Pencere içindeki gözlemler -->
  <circle cx="100" cy="90" r="6" fill="#5DCAA5"/>
  <circle cx="180" cy="90" r="6" fill="#5DCAA5"/>
  <circle cx="260" cy="90" r="6" fill="#5DCAA5"/>
  <circle cx="340" cy="90" r="6" fill="#5DCAA5"/>
  <circle cx="420" cy="90" r="6" fill="#5DCAA5"/>

  <!-- Tahmin oku ve hedefi (kesikli halka = henüz görülmemiş) -->
  <line x1="438" y1="90" x2="489" y2="90" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow3)"/>
  <circle cx="500" cy="90" r="7" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Henüz sırası gelmemiş, uzak gelecek -->
  <circle cx="580" cy="90" r="6" fill="#9C9A92" fill-opacity="0.35"/>

  <!-- ==================== KAYMA OKU ==================== -->

  <line x1="340" y1="114" x2="340" y2="176" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="356" y="149" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C2C0B6">1 ay kayar</text>

  <!-- ==================== SATIR 2 (t+1 anı) ==================== -->

  <text x="60" y="204" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9C9A92">t+1 anı</text>

  <line x1="50" y1="200" x2="600" y2="200" stroke="#444441" stroke-width="0.5" opacity="0.6"/>

  <rect x="148" y="180" width="366" height="40" rx="10" fill="#0F6E56" fill-opacity="0.25" stroke="#5DCAA5" stroke-width="0.75"/>

  <!-- Artık pencere dışında kalan geçmiş gözlem -->
  <circle cx="100" cy="200" r="6" fill="#9C9A92" fill-opacity="0.35"/>

  <!-- Önceki hedef artık pencerenin içinde -->
  <circle cx="180" cy="200" r="6" fill="#5DCAA5"/>
  <circle cx="260" cy="200" r="6" fill="#5DCAA5"/>
  <circle cx="340" cy="200" r="6" fill="#5DCAA5"/>
  <circle cx="420" cy="200" r="6" fill="#5DCAA5"/>
  <circle cx="500" cy="200" r="6" fill="#5DCAA5"/>

  <!-- Yeni tahmin oku ve hedefi -->
  <line x1="518" y1="200" x2="573" y2="200" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow3)"/>
  <circle cx="580" cy="200" r="7" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- ==================== AÇIKLAMA ==================== -->

  <rect x="126" y="243" width="14" height="14" rx="3" fill="#0F6E56" fill-opacity="0.25" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="148" y="254" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C2C0B6">Kayan pencere</text>

  <circle cx="283" cy="250" r="6" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="298" y="254" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C2C0B6">Tahmin edilen</text>

  <circle cx="426" cy="250" r="6" fill="#9C9A92" fill-opacity="0.35"/>
  <text x="441" y="254" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C2C0B6">Pencere dışı</text>
</svg>
